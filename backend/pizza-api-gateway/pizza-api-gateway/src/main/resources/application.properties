spring.application.name=pizza-api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://PIZZA-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=menu-service
spring.cloud.gateway.routes[1].uri=lb://PIZZA-MENU-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/menu/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://PIZZA-ORDER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**


#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*